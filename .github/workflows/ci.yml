name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Placeholder values — build only needs these to exist.
  # Real values live in Vercel/host env settings, never in the repo.
  NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
  NEXT_PUBLIC_SITE_URL: http://localhost:3000

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # npm install, not npm ci: the lock file is generated on Windows and
      # npm omits optional deps of platform-skipped packages (@emnapi/* via
      # @napi-rs/wasm-runtime), which makes strict `npm ci` fail on Linux.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
